model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_target: all

### dataset
dataset: facets_finetune_train
eval_dataset: facets_finetune_val
template: qwen
cutoff_len: 12000
overwrite_cache: true
preprocessing_num_workers: 5

### output
output_dir: /home/user/MIE26/models/paper_summarize
logging_steps: 10
save_steps: 50
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 64
gradient_checkpointing: true
learning_rate: 5.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### eval
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 50

report_to: wandb
run_name: facets-finetune-llamafactory

push_to_hub: true
export_hub_model_id: "RawanElmoafy/paper_summarize"
hub_private_repo: true
hub_strategy: checkpoint